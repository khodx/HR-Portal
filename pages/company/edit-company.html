<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Company - HR Portal</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div id="app">
    <div id="editCompanyView">
        <h2>Edit Company</h2>
        <div class="form-container">
            <div class="form-row">
                <label class="required">Company Name</label>
                <input type="text" id="companyName">
            </div>

            <div class="form-row">
                <label class="required">Has DBA?</label>
                <select id="hasDba" onchange="handleDbaChange()">
                    <option value="">-- Select --</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="form-row">
                <label class="required">DBA Name</label>
                <input type="text" id="dbaName">
            </div>

            <div class="form-row">
                <label class="required">Phone (###) ###-####</label>
                <input type="text" id="companyPhone" placeholder="(555) 123-4567" oninput="formatPhoneNumber(this)">
            </div>

            <!-- Physical Address Section -->
            <h3 class="form-section-title">Physical Address</h3>
            <div class="form-row">
                <label class="required">Address Line 1</label>
                <input type="text" id="addressLine1">
            </div>
            <div class="form-row">
                <label>Address Line 2</label>
                <input type="text" id="addressLine2">
            </div>
            <div class="form-row">
                <label class="required">City</label>
                <input type="text" id="city">
            </div>
            <div class="form-row">
                <label class="required">State</label>
                <select id="state">
                    <option value="">-- Select --</option>
                    <option value="AL">AL</option>
                    <option value="AK">AK</option>
                    <option value="AZ">AZ</option>
                    <option value="AR">AR</option>
                    <option value="CA">CA</option>
                    <option value="CO">CO</option>
                    <option value="CT">CT</option>
                    <option value="DE">DE</option>
                    <option value="FL">FL</option>
                    <option value="GA">GA</option>
                    <option value="HI">HI</option>
                    <option value="ID">ID</option>
                    <option value="IL">IL</option>
                    <option value="IN">IN</option>
                    <option value="IA">IA</option>
                    <option value="KS">KS</option>
                    <option value="KY">KY</option>
                    <option value="LA">LA</option>
                    <option value="ME">ME</option>
                    <option value="MD">MD</option>
                    <option value="MA">MA</option>
                    <option value="MI">MI</option>
                    <option value="MN">MN</option>
                    <option value="MS">MS</option>
                    <option value="MO">MO</option>
                    <option value="MT">MT</option>
                    <option value="NE">NE</option>
                    <option value="NV">NV</option>
                    <option value="NH">NH</option>
                    <option value="NJ">NJ</option>
                    <option value="NM">NM</option>
                    <option value="NY">NY</option>
                    <option value="NC">NC</option>
                    <option value="ND">ND</option>
                    <option value="OH">OH</option>
                    <option value="OK">OK</option>
                    <option value="OR">OR</option>
                    <option value="PA">PA</option>
                    <option value="RI">RI</option>
                    <option value="SC">SC</option>
                    <option value="SD">SD</option>
                    <option value="TN">TN</option>
                    <option value="TX">TX</option>
                    <option value="UT">UT</option>
                    <option value="VT">VT</option>
                    <option value="VA">VA</option>
                    <option value="WA">WA</option>
                    <option value="WV">WV</option>
                    <option value="WI">WI</option>
                    <option value="WY">WY</option>
                </select>
            </div>
            <div class="form-row">
                <label class="required">Zip Code (5 digits)</label>
                <input type="text" id="zip" maxlength="5">
            </div>

            <!-- Mailing Address Section -->
            <h3 class="form-section-title">Mailing Address</h3>
            <div class="form-row">
                <label class="required">Mailing Address Same as Physical?</label>
                <select id="mailingSameAsPhysical" onchange="handleMailingAddressChange()">
                    <option value="">-- Select --</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div id="mailingAddressFields" class="hidden">
                <div class="form-row">
                    <label class="required">Mailing Address Line 1</label>
                    <input type="text" id="mailingAddressLine1">
                </div>
                <div class="form-row">
                    <label>Mailing Address Line 2</label>
                    <input type="text" id="mailingAddressLine2">
                </div>
                <div class="form-row">
                    <label class="required">Mailing City</label>
                    <input type="text" id="mailingCity">
                </div>
                <div class="form-row">
                    <label class="required">Mailing State</label>
                    <select id="mailingState">
                        <option value="">-- Select --</option>
                        <option value="AL">AL</option>
                        <option value="AK">AK</option>
                        <option value="AZ">AZ</option>
                        <option value="AR">AR</option>
                        <option value="CA">CA</option>
                        <option value="CO">CO</option>
                        <option value="CT">CT</option>
                        <option value="DE">DE</option>
                        <option value="FL">FL</option>
                        <option value="GA">GA</option>
                        <option value="HI">HI</option>
                        <option value="ID">ID</option>
                        <option value="IL">IL</option>
                        <option value="IN">IN</option>
                        <option value="IA">IA</option>
                        <option value="KS">KS</option>
                        <option value="KY">KY</option>
                        <option value="LA">LA</option>
                        <option value="ME">ME</option>
                        <option value="MD">MD</option>
                        <option value="MA">MA</option>
                        <option value="MI">MI</option>
                        <option value="MN">MN</option>
                        <option value="MS">MS</option>
                        <option value="MO">MO</option>
                        <option value="MT">MT</option>
                        <option value="NE">NE</option>
                        <option value="NV">NV</option>
                        <option value="NH">NH</option>
                        <option value="NJ">NJ</option>
                        <option value="NM">NM</option>
                        <option value="NY">NY</option>
                        <option value="NC">NC</option>
                        <option value="ND">ND</option>
                        <option value="OH">OH</option>
                        <option value="OK">OK</option>
                        <option value="OR">OR</option>
                        <option value="PA">PA</option>
                        <option value="RI">RI</option>
                        <option value="SC">SC</option>
                        <option value="SD">SD</option>
                        <option value="TN">TN</option>
                        <option value="TX">TX</option>
                        <option value="UT">UT</option>
                        <option value="VT">VT</option>
                        <option value="VA">VA</option>
                        <option value="WA">WA</option>
                        <option value="WV">WV</option>
                        <option value="WI">WI</option>
                        <option value="WY">WY</option>
                    </select>
                </div>
                <div class="form-row">
                    <label class="required">Mailing Zip Code (5 digits)</label>
                    <input type="text" id="mailingZip" maxlength="5">
                </div>
            </div>

            <!-- Tax Information Section -->
            <div id="taxInfoSection" class="hidden">
                <h3 class="form-section-title">Tax Information</h3>
                <div class="form-row">
                    <label class="required">EIN (##-#######)</label>
                    <input type="text" id="ein" placeholder="12-3456789" oninput="formatEIN(this)">
                </div>
                <div class="form-row">
                    <label class="required">Payroll Tax Account # (###-####-#)</label>
                    <input type="text" id="payrollTaxAccount" placeholder="123-4567-8" oninput="formatPayrollTax(this)">
                </div>
            </div>

            <div class="form-buttons">

            <div class="form-buttons">
                <button class="btn-back-form" onclick="window.location.href='/'">Back</button>
                <button class="btn-primary" onclick="updateCompany()">Save Changes</button>
                <button class="btn-secondary" onclick="window.location.href='/'">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="/src/company/edit-company.js"></script>
</div>
</body>
</html>
